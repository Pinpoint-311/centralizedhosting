# The panel's own stack (control plane only — towns run in their own stacks).
services:
  panel-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: panel
      POSTGRES_PASSWORD: ${PANEL_DB_PASSWORD:?Set PANEL_DB_PASSWORD in .env}
      POSTGRES_DB: panel
    volumes:
      - panel_pg:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U panel" ]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  panel:
    build: .
    restart: unless-stopped
    environment:
      PANEL_DATABASE_URL: postgresql+psycopg://panel:${PANEL_DB_PASSWORD}@panel-db/panel
      PANEL_SECRET_KEY: ${PANEL_SECRET_KEY:?Set PANEL_SECRET_KEY — encrypts brokered secrets at rest}
      PANEL_API_TOKEN: ${PANEL_API_TOKEN:?Set PANEL_API_TOKEN — operator API auth}
      BASE_DOMAIN: ${BASE_DOMAIN:-311.example.gov}
      TENANT_ROOT: /tenants
      APPLY_STACKS: ${APPLY_STACKS:-false}
      # Automatically poll town health/telemetry and re-evaluate alerts so
      # status stays current without the manual button (seconds; 0 disables).
      TELEMETRY_POLL_SECONDS: ${TELEMETRY_POLL_SECONDS:-300}
      ALERT_POLL_SECONDS: ${ALERT_POLL_SECONDS:-300}
      # --- Government hardening (all optional; see README → Security & Governance) ---
      # KMS envelope encryption of secrets at rest — SAME vars as the app.
      KMS_PROVIDER: ${KMS_PROVIDER:-google}
      REQUIRE_KMS: ${REQUIRE_KMS:-}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      KMS_LOCATION: ${KMS_LOCATION:-}
      KMS_KEY_RING: ${KMS_KEY_RING:-}
      KMS_KEY_ID: ${KMS_KEY_ID:-}
      GCP_SERVICE_ACCOUNT_JSON: ${GCP_SERVICE_ACCOUNT_JSON:-}
      AWS_KMS_KEY_ID: ${AWS_KMS_KEY_ID:-}
      AWS_REGION: ${AWS_REGION:-}
      AZURE_KEYVAULT_URL: ${AZURE_KEYVAULT_URL:-}
      AZURE_KEYVAULT_KEY: ${AZURE_KEYVAULT_KEY:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_KEYVAULT_CLIENT_ID: ${AZURE_KEYVAULT_CLIENT_ID:-}
      AZURE_KEYVAULT_CLIENT_SECRET: ${AZURE_KEYVAULT_CLIENT_SECRET:-}
      # Supply chain: refuse unpinned images + cosign-verify signatures.
      REQUIRE_SIGNED_IMAGES: ${REQUIRE_SIGNED_IMAGES:-false}
      COSIGN_VERIFY: ${COSIGN_VERIFY:-false}
      COSIGN_IDENTITY: ${COSIGN_IDENTITY:-}
      COSIGN_ISSUER: ${COSIGN_ISSUER:-}
      COSIGN_KEY: ${COSIGN_KEY:-}
      # Error monitoring + API rate limiting — SAME as the app.
      SENTRY_DSN: ${SENTRY_DSN:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-500}
      # Off-host audit shipping (WORM journal + SIEM) — panel extra on top of the
      # app-uniform hash chain + [AUDIT ANCHOR] stdout anchoring.
      AUDIT_WORM_PATH: ${AUDIT_WORM_PATH:-}
      AUDIT_SIEM_URL: ${AUDIT_SIEM_URL:-}
      AUDIT_SIEM_TOKEN: ${AUDIT_SIEM_TOKEN:-}
      # TLS cert-expiry + health alerting.
      SSL_CHECK_ENABLED: ${SSL_CHECK_ENABLED:-false}
      CERT_EXPIRY_WARN_DAYS: ${CERT_EXPIRY_WARN_DAYS:-21}
      # Town database backups — SAME method + env vars as the app
      # (pg_dump -Fc | gpg AES256 → S3).
      BACKUPS_ENABLED: ${BACKUPS_ENABLED:-false}
      BACKUP_POLL_SECONDS: ${BACKUP_POLL_SECONDS:-0}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:-}
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:-}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-us-ashburn-1}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
      # Edge WAF + rate limiting in rendered town Caddy sites.
      WAF_ENABLED: ${WAF_ENABLED:-false}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-40}
      # Operator SSO — SAME provider catalog + env vars as the app. Pick one
      # provider and set its credentials; the panel derives the issuer exactly
      # as the app does. Group→role mapping reuses ROLE_GROUP_MAP below.
      IDENTITY_PROVIDER: ${IDENTITY_PROVIDER:-}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET:-}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET:-}
      ENTRA_AUTHORITY: ${ENTRA_AUTHORITY:-}
      OKTA_ISSUER: ${OKTA_ISSUER:-}
      OKTA_CLIENT_ID: ${OKTA_CLIENT_ID:-}
      OKTA_CLIENT_SECRET: ${OKTA_CLIENT_SECRET:-}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      # Trust the SSO sidecar's identity/group headers (see oauth2-proxy below).
      OPERATOR_HEADER: ${OPERATOR_HEADER:-}
      ROLES_HEADER: ${ROLES_HEADER:-}
      ROLE_GROUP_MAP: ${ROLE_GROUP_MAP:-}
    volumes:
      - ${TENANT_ROOT_HOST:-./tenants}:/tenants
      # Only needed with APPLY_STACKS=true — the panel is the ONE trusted
      # component allowed to drive Docker on the managed host (the towns
      # themselves never get the socket; see ORCHESTRATOR_PLAN.md A2).
      # - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:${PANEL_PORT:-8100}:8100"
    depends_on:
      panel-db:
        condition: service_healthy

  # SSO + MFA sidecar (opt-in): front the panel with oauth2-proxy so every
  # operator authenticates against the host IdP (MFA enforced there) before any
  # panel route is reachable. oauth2-proxy injects X-Forwarded-User /
  # X-Forwarded-Groups, which the panel maps to RBAC roles. Render this config
  # from the panel's federation settings: GET /api/auth/sidecar-config.
  # Enable with:  docker compose --profile sso up -d
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    profiles: ["sso"]
    restart: unless-stopped
    command: ["--config=/etc/oauth2-proxy.cfg", "--http-address=0.0.0.0:4180"]
    volumes:
      - ${OAUTH2_PROXY_CFG:-./oauth2-proxy.cfg}:/etc/oauth2-proxy.cfg:ro
    environment:
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET:-}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:-}
    ports:
      - "0.0.0.0:${PANEL_HTTPS_PORT:-443}:4180"
    depends_on:
      - panel

volumes:
  panel_pg:
